<!DOCTYPE html>
<html>
<head>
  <title>Chemistry Simulator</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #eef6ff;
      text-align: center;
    }

    h1 {
      padding: 20px;
    }

    #container {
      display: flex;
      justify-content: center;
      gap: 40px;
    }

    #chemicals {
      width: 200px;
    }

    .chem {
      padding: 10px;
      margin: 8px;
      background: white;
      border-radius: 8px;
      cursor: pointer;
      border: 1px solid #ccc;
    }

    #beaker {
      width: 250px;
      height: 350px;
      border: 5px solid #888;
      border-radius: 0 0 40px 40px;
      position: relative;
      background: rgba(200,220,255,0.3);
      overflow: hidden;
    }

    #liquid {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 0%;
      background: lightblue;
      transition: all 0.5s;
    }

    .bubble {
      position: absolute;
      width: 10px;
      height: 10px;
      background: white;
      border-radius: 50%;
      animation: rise 2s infinite;
    }

    @keyframes rise {
      from { transform: translateY(0); opacity: 1;}
      to { transform: translateY(-200px); opacity: 0;}
    }

    .explosion {
      position: absolute;
      width: 100px;
      height: 100px;
      background: orange;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: boom 0.5s;
    }

    @keyframes boom {
      from { transform: scale(0);}
      to { transform: scale(3); opacity: 0;}
    }
  </style>
</head>

<body>

<h1>🔬 Chemistry Simulator</h1>

<div id="container">

  <div id="chemicals">
    <div class="chem" onclick="add('acid')">Acid</div>
    <div class="chem" onclick="add('base')">Base</div>
    <div class="chem" onclick="add('metal')">Metal</div>
    <div class="chem" onclick="add('water')">Water</div>
  </div>

  <div id="beaker">
    <div id="liquid"></div>
  </div>

</div>

<script>
let contents = [];

function add(type) {
  contents.push(type);
  updateLiquid();
  react();
}

function updateLiquid() {
  let liquid = document.getElementById("liquid");
  liquid.style.height = (contents.length * 20) + "%";
}

function react() {
  let beaker = document.getElementById("beaker");

  // Acid + Base → fizz
  if (contents.includes("acid") && contents.includes("base")) {
    for (let i = 0; i < 10; i++) {
      let b = document.createElement("div");
      b.className = "bubble";
      b.style.left = Math.random() * 200 + "px";
      b.style.bottom = "0px";
      beaker.appendChild(b);
      setTimeout(() => b.remove(), 2000);
    }
  }

  // Metal + Water → explosion
  if (contents.includes("metal") && contents.includes("water")) {
    let boom = document.createElement("div");
    boom.className = "explosion";
    beaker.appendChild(boom);
    setTimeout(() => boom.remove(), 500);
  }
}
</script>

</body>
</html>
