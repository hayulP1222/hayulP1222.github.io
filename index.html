<!DOCTYPE html>
<html>
<head>
  <title>Chemistry Simulator</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #eef6ff;
      text-align: center;
    }

    h1 {
      padding: 20px;
    }

    #container {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-top: 20px;
    }

    #chemicals {
      width: 220px;
      height: 500px;
      overflow-y: auto;
      background: #ffffff;
      border-radius: 10px;
      padding: 10px;
      border: 1px solid #ccc;
    }

    .chem {
      padding: 10px;
      margin: 6px 0;
      background: #f8fafc;
      border-radius: 6px;
      cursor: pointer;
      border: 1px solid #ddd;
      transition: 0.2s;
    }

    .chem:hover {
      background: #e0f2fe;
    }

    #beaker {
      width: 300px;
      height: 400px;
      border: 6px solid #777;
      border-radius: 0 0 50px 50px;
      position: relative;
      background: rgba(180, 200, 255, 0.25);
      overflow: hidden;
    }

    #liquid {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 0%;
      background: lightblue;
      transition: all 0.5s;
    }

    #controls {
      margin-top: 20px;
    }

    button {
      padding: 10px 15px;
      margin: 5px;
      border-radius: 6px;
      border: none;
      background: #3b82f6;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #2563eb;
    }

  </style>
</head>
